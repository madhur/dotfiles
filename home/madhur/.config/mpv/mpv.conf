
vo=gpu
gpu-api=vulkan

#hwdec=no

sub-auto=fuzzy
sub-bold=no

sub-font="JetBrains Mono"

#hwdec=auto
hwdec=no

# Use fast, GPU-friendly scaling
scale=bilinear
cscale=bilinear
dscale=bilinear

screenshot-template="%F - [%P] (%#01n)"

script-opts=osc-scalewindowed=0.5,osc-scalefullscreen=0.5
script-opts=osc-vidscale=no

#osc=auto
save-position-on-quit

#sub-visibility=no

[extension.gif]
osc=no
loop-file

[extension.mp3]
no-video

[extension.flac]
no-video

[extension.ogg]
no-video

[extension.opus]
no-video

[extension.aac]
no-video

[extension.wav]
no-video

[extension.m4a]
no-video


