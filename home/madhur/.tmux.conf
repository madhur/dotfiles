set -g base-index 1
set -g pane-base-index 1
bind r source-file ~/.tmux.conf \; display "Reloaded!"
#bind | split-window -h
#bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K  resize-pane -U 5
bind L resize-pane -R 5
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g status-style "fg=#e0e0e0,bg=#1e4620"
setw -g window-status-style "fg=#a0c8a0,bg=#1e4620"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#ffffff,bold,bg=#2d6a31"
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator "  "
setw -g pane-border-style "fg=colour238,bg=default"
setw -g pane-active-border-style "fg=colour75,bg=default"
setw -g window-style "fg=colour244,bg=colour235"
setw -g window-active-style "fg=white,bg=black"
set -g status-left-length 40
set -g status-left "#[fg=#98c379,bold] #S #[fg=#5a8a5a,nobold] │ #[fg=#e0e0e0]#I:#P "
#tw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
#set -g status-right '#[fg=colour233,bg=colour19] %d/%m #[fg=colour233,bg=colour8] %H:%M '
#set -g status-right '#[fg=white]#(hostname)@#(host `hostname` | cut -d " " -f 4)'
#set -g status-right '#[fg=cyan,bold] #U@#H #[default]#[fg=blue]#(tmux display-message -p "#{pane_current_path}" | sed "s#$HOME#~#g") #[fg=red]%H:%M %d-%b-%y#[default]'
set -g status-justify centre
setw -g monitor-activity on
set -g visual-activity on
bind - split-window -v -c  "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind C-s set-window-option synchronize-panes \; display "Synchronize toggle!"
bind C-T display-popup -w 90% -E "\
  tmux list-windows -a -F '#{session_name}:#{window_index}|#{window_name}' \
  | column -s '|' -t \
  | fzf --reverse --cycle --preview-window right:75% --preview='echo {} \
    | cut -d \" \" -f 1 \
    | xargs tmux capture-pane -p -e -N -t' \
  | cut -d ' ' -f 1 \
  | xargs --no-run-if-empty tmux switch-client -t"

set-option -g status-interval 60
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on
# Disable automatic rename off
setw -g allow-rename off
#set set-titles-string "#T"
#set status-right "#T"
set-option -g status-position bottom
#run-shell ~/github/personal/tmux-current-pane-hostname/current_pane_hostname.tmux
#set -g status-right "madhur"

set -g status-right "#[fg=#e0e0e0]#(echo #{pane_current_path} | sed s,$HOME,~,) #[fg=#5a8a5a]│ #[fg=#e0e0e0]#H #[fg=#5a8a5a]│ #[fg=#5a8a5a]ctx:#[fg=#98c379]#(cat /tmp/claude-ctx.txt 2>/dev/null | tr -d '\n' && printf '%%' || echo '-') #[fg=#5a8a5a]│ #[fg=#98c379]%H:%M #[fg=#5a8a5a]%d-%b #(~/scripts/idle-remaining-plain.sh)"

set -g status-right-length 160
#set -g status-right-style default
